name: 'Update Extension Registry Version'
description: 'Add a new version to a module in the k6 extension registry and create a pull request'
author: 'Grafana Labs'

inputs:
  module:
    description: 'The module name to update (e.g., github.com/grafana/xk6-sql)'
    required: true
  version:
    description: 'The version to add (e.g., v1.0.6)'
    required: true
  token:
    description: 'GitHub token with permissions to create pull requests'
    required: true
  registry-path:
    description: 'Path to checkout the k6-extension-registry repository'
    required: false
    default: 'registry'

runs:
  using: 'composite'
  steps:
    - name: Checkout registry repository
      uses: actions/checkout@v4
      with:
        repository: grafana/k6-extension-registry
        token: ${{ inputs.token }}
        path: ${{ inputs.registry-path }}

    - name: Install yq
      shell: bash
      run: |
        echo "Installing yq v4..."
        sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
        sudo chmod +x /usr/local/bin/yq
        yq --version

    - name: Update registry with new version
      id: update-registry
      shell: bash
      run: |
        set -e
        
        MODULE="${{ inputs.module }}"
        VERSION="${{ inputs.version }}"
        REGISTRY_PATH="${{ inputs.registry-path }}/registry.yaml"
        
        echo "Updating module: $MODULE"
        echo "Adding version: $VERSION"
        echo "Registry file: $REGISTRY_PATH"
        
        # Check if registry file exists
        if [[ ! -f "$REGISTRY_PATH" ]]; then
          echo "Error: Registry file $REGISTRY_PATH does not exist"
          exit 1
        fi
        
        # Check if module exists in registry
        MODULE_INDEX=$(yq eval ".[] | select(.module == \"$MODULE\") | path | .[0]" "$REGISTRY_PATH")
        
        if [[ -z "$MODULE_INDEX" ]]; then
          echo "Error: Module $MODULE not found in registry"
          exit 1
        fi
        
        echo "Found module at index: $MODULE_INDEX"
        
        # Check if version already exists
        VERSION_EXISTS=$(yq eval ".[$MODULE_INDEX].versions[] | select(. == \"$VERSION\")" "$REGISTRY_PATH")
        
        if [[ -n "$VERSION_EXISTS" ]]; then
          echo "Version $VERSION already exists for module $MODULE"
          echo "no-changes=true" >> $GITHUB_OUTPUT
          exit 0
        fi
        
        # Add the new version to the module
        yq eval ".[$MODULE_INDEX].versions += [\"$VERSION\"]" -i "$REGISTRY_PATH"
        
        echo "Successfully added version $VERSION to module $MODULE"
        echo "no-changes=false" >> $GITHUB_OUTPUT
        
        # Show the updated versions for this module
        echo "Current versions for $MODULE:"
        yq eval ".[$MODULE_INDEX].versions[]" "$REGISTRY_PATH"

    - name: Create Pull Request
      if: steps.update-registry.outputs.no-changes != 'true'
      uses: peter-evans/create-pull-request@v5
      with:
        path: ${{ inputs.registry-path }}
        token: ${{ inputs.token }}
        title: 'Add ${{ inputs.version }} to ${{ inputs.module }}'
        body: |
          Automatically adds version ${{ inputs.version }} for ${{ inputs.module }} to the k6 extension registry.
          
          **Module:** ${{ inputs.module }}
          **Version:** ${{ inputs.version }}
        branch: add-version-${{ inputs.module }}-${{ inputs.version }}
        commit-message: 'Add ${{ inputs.version }} for ${{ inputs.module }}'

branding:
  icon: 'package'
  color: 'orange'