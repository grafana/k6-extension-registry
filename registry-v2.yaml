# k6 v2

- module: go.k6.io/k6/v2
  description: A modern load testing tool, using Go and JavaScript
  tier: official
  imports:
    - k6
  versions:
    - v0.0.0+43b6303a377a

# Official extensions

- module: github.com/grafana/xk6-dns
  description: DNS resolution and lookups in your tests
  tier: official
  imports:
    - k6/x/dns
  versions:
    - v1.1.0

- module: github.com/grafana/xk6-faker
  description: Generate fake data in your tests
  tier: official
  imports:
    - k6/x/faker
  versions:
    - v0.5.0

- module: github.com/grafana/xk6-icmp
  description: ICMP protocol support for k6
  tier: official
  imports:
    - k6/x/icmp
  versions:
    - v0.3.0

- module: github.com/grafana/xk6-mqtt
  description: MQTT protocol support for k6
  tier: official
  imports:
    - k6/x/mqtt
  versions:
    - v0.3.0

- module: github.com/grafana/xk6-redis
  description: Extension for Redis database
  tier: official
  imports:
    - k6/x/redis
  versions:
    - v0.4.0

- module: github.com/grafana/xk6-sql
  description: Load-test SQL Servers
  tier: official
  imports:
    - k6/x/sql
  versions:
    - v1.1.0

- module: github.com/grafana/xk6-sql-driver-mysql
  description: xk6-sql driver extension for MySQL database support
  tier: official
  imports:
    - k6/x/sql/driver/mysql
  versions:
    - v0.3.0

- module: github.com/grafana/xk6-sql-driver-postgres
  description: xk6-sql driver extension for Postgres database support
  tier: official
  imports:
    - k6/x/sql/driver/postgres
  versions:
    - v0.2.0

- module: github.com/grafana/xk6-ssh
  description: Use SSH connections in your tests
  tier: official
  imports:
    - k6/x/ssh
  versions:
    - v0.2.0

- module: github.com/grafana/xk6-subcommand-agent
  description: Bootstrap an AI-assisted k6 testing workflow in any editor
  tier: official
  subcommands:
    - agent
  versions:
    - v0.1.1

- module: github.com/grafana/xk6-subcommand-explore
  description: Explore k6 extensions for Automatic Resolution
  tier: official
  subcommands:
    - explore
  versions:
    - v1.1.0

- module: github.com/grafana/xk6-docs
  description: CLI k6 docs for AI agents and users
  tier: official
  subcommands:
    - docs
  versions:
    - v0.0.9

- module: github.com/grafana/xk6-tcp
  description: TCP protocol support for k6
  tier: official
  imports:
    - k6/x/tcp
  versions:
    - v0.3.0
